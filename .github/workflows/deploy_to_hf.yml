name: Deploy to Hugging Face

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Git LFS
        run: |
          sudo apt-get install -y git-lfs
          git lfs install

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch full history for a clean push
          lfs: true        # Download LFS objects on checkout

      - name: Configure Git LFS and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Add HF as a named remote so git-lfs can resolve the LFS endpoint correctly
          git remote add huggingface "https://pschaus:${HF_TOKEN}@huggingface.co/spaces/pschaus/llm4cp"

          # Push LFS objects to HF LFS storage first (required before the git push)
          git lfs push huggingface main

          # Now push the git commits (which contain LFS pointers, not raw blobs)
          git push --force huggingface main
